<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل متطوع / شركة - منصة الأعزاء</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="btn btn-sm btn-outline-secondary" href="index.html"><i class="fa-solid fa-arrow-right me-1"></i> عودة</a>
            <span class="navbar-brand mb-0 h1 m-auto">طلب تطوع / مساهمة</span>
        </div>
    </nav>

    <div class="container my-4" style="max-width: 600px;">
        <div class="card shadow-sm border-0 p-4" style="border-top: 4px solid #ffda33 !important; border-radius: 15px;">
            <p class="text-muted small text-center mb-4">أهلاً بك يا باغي الخير، مساهمتك هي حجر الأساس في إعادة إعمار الجنوب.</p>
            
            <form id="form-volunteer-submit">
                <!-- نوع المساهم -->
                <div class="mb-3">
                    <label class="form-label fw-bold">نوع المساهمة</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="volunteerType" id="typeIndividual" checked>
                            <label class="form-check-label" for="typeIndividual">فرد (متطوع)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="volunteerType" id="typeCompany">
                            <label class="form-check-label" for="typeCompany">شركة / مؤسسة / معمل</label>
                        </div>
                    </div>
                </div>

                <!-- الاسم -->
                <div class="mb-3">
                    <label for="vName" class="form-label fw-bold">الاسم الكامل / اسم الشركة</label>
                    <input type="text" class="form-control" id="vName" required placeholder="أدخل الاسم">
                </div>

                <!-- رقم الهاتف -->
                <div class="mb-3">
                    <label for="vPhone" class="form-label fw-bold">رقم الهاتف (واتساب)</label>
                    <input type="tel" class="form-control" id="vPhone" required placeholder="03XXXXXX">
                </div>

                <!-- التخصص / نوع الدعم -->
                <div class="mb-3">
                    <label for="vSpecialty" class="form-label fw-bold">ماذا يمكنك أن تقدم في سبيل الإعمار؟</label>
                    <select class="form-select" id="vSpecialty" required>
                        <option value="" selected disabled>اختر مجال مساهمتك...</option>
                        <option value="engineering">استشارات هندسية وإشراف</option>
                        <option value="construction">أعمال بناء ومقاولات</option>
                        <option value="electricity">تمديدات كهربائية وطاقة شمسية</option>
                        <option value="plumbing">تمديدات صحية ومياه</option>
                        <option value="materials">تأمين مواد بناء (إسمنت، حجر، طلاء)</option>
                        <option value="logistics">نقل، آليات ثقيلة، أو جهد بدني</option>
                        <option value="other">مختلف / دعم آخر</option>
                    </select>
                </div>

                <!-- النطاق الجغرافي -->
                <div class="mb-3">
                    <label for="vRegion" class="form-label fw-bold">النطاق الجغرافي الذي يمكنك تغطيته</label>
                    <input type="text" class="form-control" id="vRegion" required placeholder="مثال: قضاء صور، قرى بنت جبيل...">
                </div>

                <!-- تفاصيل إضافية -->
                <div class="mb-3">
                    <label for="vNotes" class="form-label fw-bold">ملاحظات إضافية</label>
                    <textarea class="form-control" id="vNotes" rows="3" placeholder="أي تفاصيل أخرى حول المعدات أو الكفاءات المتوفرة لديك..."></textarea>
                </div>

                <button type="submit" class="btn btn-gold-primary btn-cta w-100 mt-3 shadow-sm">إرسال طلب المساهمة</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
