<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التطوع والانتساب - منصة الأعزاء</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-light bg-white shadow-sm sticky-top luxury-nav">
        <div class="container">
            <a class="btn btn-sm btn-outline-secondary" href="index.html"><i class="fa-solid fa-arrow-right me-1"></i> عودة للرئيسية</a>
            <span class="navbar-brand mb-0 h1 m-auto text-gold">بوابة الانتساب والتطوع للخدمات</span>
        </div>
    </nav>

    <div class="container my-4" style="max-width: 600px;">
        <div class="card shadow-sm border-0 p-4 luxury-card">
            <p class="text-muted small text-center mb-4 fw-bold">أهلاً فيك يا راعي الخير، بـ همّتك وإيدك معنا منرجع منعمّر الجنوب.</p>
            
            <form id="form-volunteer-submit">
                <!-- نوع الانتساب -->
                <div class="mb-4">
                    <label class="form-label fw-bold"><i class="fa-solid fa-user-plus text-warning me-1"></i> خيار الانتساب للمنصة</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="volunteerType" id="typeIndividual" checked>
                            <label class="form-check-label" for="typeIndividual">فرد (طلب انتساب وتطوع)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="volunteerType" id="typeCompany">
                            <label class="form-check-label" for="typeCompany">جهة / شركة / مصنع داخل أو خارج لبنان</label>
                        </div>
                    </div>
                </div>

                <hr class="opacity-10">

                <!-- البيانات الأساسية -->
                <div class="mb-3">
                    <label for="vName" class="form-label fw-bold">الاسم الكامل / اسم الجهة</label>
                    <input type="text" class="form-control" id="vName" required placeholder="أدخل الاسم">
                </div>

                <div class="mb-3">
                    <label for="vPhone" class="form-label fw-bold">رقم الهاتف (واتساب)</label>
                    <input type="tel" class="form-control" id="vPhone" required placeholder="03XXXXXX">
                </div>

                <!-- تحديد مجال التطوع الميداني الدقيق -->
                <div class="mb-4">
                    <label class="form-label fw-bold text-dark"><i class="fa-solid fa-heart-circle-check text-warning me-1"></i> وين حابب تكون متطوع؟ (مجال العمل الميداني)</label>
                    <select class="form-select border-warning" id="vField" required>
                        <option value="" selected disabled>اختر المجال الميداني الفردي...</option>
                        <option value="media">إعلامي (تغطية، تصوير، توثيق قصص الإعمار)</option>
                        <option value="activities">أنشطة ميدانية (تنظيم، ورش بناء، طلاء، جهد بدني)</option>
                        <option value="medical">صحي (إسعاف، رعاية أولية، تأمين أدوية)</option>
                        <option value="psychological">دعم نفسي (مساندة عائلات وأطفال عائدين)</option>
                        <option value="none">أنا شركة / جهة مانحة لمواد بناء وخدمات فقط</option>
                    </select>
                </div>

                <!-- مجالات الخدمات اللوجستية والمهنية -->
                <div class="mb-4">
                    <label for="vSpecialty" class="form-label fw-bold"><i class="fa-solid fa-truck-ramp-box text-warning me-1"></i> خدمات لوجستية ومواد بناء (إن وجدت)</label>
                    <select class="form-select" id="vSpecialty">
                        <option value="none" selected>لا يوجد (تطوع ميداني فردي فقط)</option>
                        <option value="engineering">استشارات هندسية وإشراف فني</option>
                        <option value="materials">تأمين مواد بناء (إسمنت، حجر، طلاء، حديد)</option>
                        <option value="logistics">خدمات لوجستية (آليات ثقيلة، جرافات، نقل ومعدات)</option>
                        <option value="electricity">تمديدات كهربائية وصحية وطاقة شمسية</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="vRegion" class="form-label fw-bold">النطاق الجغرافي للتواجد (مكان رغبتك بالخدمة)</label>
                    <input type="text" class="form-control" id="vRegion" required placeholder="مثال: قضاء بنت جبيل، قرى صور...">
                </div>

                <button type="submit" class="btn btn-gold-primary btn-cta w-100 mt-3 shadow-sm">إرسال طلب الانتساب والمساهمة</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
