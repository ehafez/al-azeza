<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب دعم إعمار - منصة الأعزاء</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="backToTop" class="back-to-top" aria-label="العودة إلى الأعلى"><i class="fa-solid fa-arrow-up"></i></button>

    <!-- ترويسة الصفحة -->
    <header class="page-hero">
        <div class="container top-row d-flex justify-content-between align-items-center">
            <a class="btn btn-sm btn-outline-warning back-btn" href="index.html"><i class="fa-solid fa-arrow-right me-1"></i> عودة للرئيسية</a>
            <a href="index.html" class="luxury-brand-logo small-logo text-decoration-none">
                <i class="fa-solid fa-hand-holding-heart me-2 brand-icon"></i>الأعزّاء
            </a>
        </div>
        <div class="container text-center">
            <h1 class="page-hero-title"><i class="fa-solid fa-house-chimney-crack me-2 pulse-icon"></i>تسجيل طلب دعم وإعمار</h1>
            <p class="page-hero-sub Amiri-font">أهلنا الأعزاء، نرجو تعبئة حجم الضرر بدقة لتسهيل مطابقته مع المتطوعين والشركات المناسبة</p>
        </div>
    </header>

    <div class="container my-5 reveal-on-scroll" style="max-width: 640px;">
        <div class="card shadow-sm border-0 p-4 luxury-card">
            <p class="text-muted small text-center mb-4 fw-bold">طلبكم محفوظ بكرامة وسرّية تامة، وسيتم التواصل معكم بعد المطابقة مباشرة.</p>

            <form id="form-help-submit">
                <!-- اسم رب الأسرة -->
                <div class="mb-3">
                    <label for="hName" class="form-label fw-bold">اسم رب الأسرة / مقدم الطلب</label>
                    <input type="text" class="form-control" id="hName" required placeholder="الاسم الكامل">
                </div>

                <!-- رقم الهاتف -->
                <div class="mb-3">
                    <label for="hPhone" class="form-label fw-bold">رقم الهاتف للتواصل</label>
                    <input type="tel" class="form-control" id="hPhone" required placeholder="03XXXXXX">
                </div>

                <!-- المنطقة والبلدة -->
                <div class="mb-3">
                    <label for="hAddress" class="form-label fw-bold">البلدة / القرية في الجنوب</label>
                    <input type="text" class="form-control" id="hAddress" required placeholder="مثال: الخيام، عيتا الشعب، النبطية...">
                </div>

                <!-- نوع الضرر والحاجة -->
                <div class="mb-3">
                    <label for="hType" class="form-label fw-bold">نوع الضرر المطلوب معالجته</label>
                    <select class="form-select" id="hType" required>
                        <option value="" selected disabled>اختر تصنيف الضرر...</option>
                        <option value="total">دمار كلي (بحاجة لإعادة بناء بالكامل)</option>
                        <option value="partial">ضرر جزئي بليغ (تصدعات، أسقف، جدران)</option>
                        <option value="finishing">أعمال تشطيب وترميم خفيف (طلاء، أبواب ونوافذ)</option>
                        <option value="utilities">تأهيل شبكات أساسية (كهرباء / مياه وصحي)</option>
                    </select>
                </div>

                <!-- تحميل صورة للضرر -->
                <div class="mb-3">
                    <label for="hFiles" class="form-label fw-bold">إرفاق صور للأضرار (إن وجدت - لتقييم المهندسين)</label>
                    <input class="form-control" type="file" id="hFiles" multiple>
                </div>

                <!-- تفاصيل إضافية -->
                <div class="mb-3">
                    <label for="hNotes" class="form-label fw-bold">شرح إضافي عن حالة المنزل الحالية</label>
                    <textarea class="form-control" id="hNotes" rows="3" placeholder="اذكر هنا أهم الأولويات المستعجلة لعائلتكم..."></textarea>
                </div>

                <button type="submit" class="btn btn-charcoal-secondary btn-cta w-100 mt-3 shadow-sm">
                    <i class="fa-solid fa-paper-plane me-2"></i>إرسال الطلب بكرامة
                </button>
                <p class="text-center text-muted small mt-3 mb-0"><i class="fa-solid fa-lock me-1"></i> بياناتك محفوظة بسرّية تامة</p>
            </form>
        </div>
    </div>

    <footer class="site-footer-mini">
        <span class="text-gold fw-bold">منصة الأعزاء</span> © 2026 - مبادرة أهلية تطوعية تكافلية
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
