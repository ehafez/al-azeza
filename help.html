<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب دعم إعمار - منصة الأعزاء</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="btn btn-sm btn-outline-secondary" href="index.html"><i class="fa-solid fa-arrow-right me-1"></i> عودة</a>
            <span class="navbar-brand mb-0 h1 m-auto">تسجيل طلب دعم وإعمار</span>
        </div>
    </nav>

    <div class="container my-4" style="max-width: 600px;">
        <div class="card shadow-sm border-0 p-4" style="border-top: 4px solid #2b291f !important; border-radius: 15px;">
            <p class="text-muted small text-center mb-4">أهلنا الأعزاء، نرجو تعبئة حجم الضرر بدقة لتسهيل مطابقتها مع المتطوعين والشركات المناسبة.</p>
            
            <form id="form-help-submit">
                <!-- اسم رب الأسرة -->
                <div class="mb-3">
                    <label for="hName" class="form-label fw-bold">اسم رب الأسرة / مقدم الطلب</label>
                    <input type="text" class="form-control" id="hName" required placeholder="الاسم الكامل">
                </div>

                <!-- رقم الهاتف -->
                <div class="mb-3">
                    <label for="hPhone" class="form-label fw-bold">رقم الهاتف للتواصل</label>
                    <input type="tel" class="form-control" id="hPhone" required placeholder="03XXXXXX">
                </div>

                <!-- المنطقة والبلدة -->
                <div class="mb-3">
                    <label for="hAddress" class="form-label fw-bold">البلدة / القرية في الجنوب</label>
                    <input type="text" class="form-control" id="hAddress" required placeholder="مثال: الخيام، عيتا الشعب، النبطية...">
                </div>

                <!-- نوع الضرر والحاجة -->
                <div class="mb-3">
                    <label for="hType" class="form-label fw-bold">نوع الضرر المطلوب معالجته</label>
                    <select class="form-select" id="hType" required>
                        <option value="" selected disabled>اختر تصنيف الضرر...</option>
                        <option value="total">دمار كلي (بحاجة لإعادة بناء بالكامل)</option>
                        <option value="partial">ضرر جزئي بليغ (تصدعات، أسقف، جدران)</option>
                        <option value="finishing">أعمال تشطيب وترميم خفيف (طلاء، أبواب ونوافذ)</option>
                        <option value="utilities">تأهيل شبكات أساسية (كهرباء / مياه وصحي)</option>
                    </select>
                </div>

                <!-- تحميل صورة للضرر -->
                <div class="mb-3">
                    <label for="hFiles" class="form-label fw-bold">إرفاق صور للأضرار (إن وجدت - لتقييم المهندسين)</label>
                    <input class="form-control" type="file" id="hFiles" id="formFileMultiple" multiple>
                </div>

                <!-- تفاصيل إضافية -->
                <div class="mb-3">
                    <label for="hNotes" class="form-label fw-bold">شرح إضافي عن حالة المنزل الحالية</label>
                    <textarea class="form-control" id="hNotes" rows="3" placeholder="اذكر هنا أهم الأولويات المستعجلة لعائلتكم..."></textarea>
                </div>

                <button type="submit" class="btn btn-charcoal-secondary btn-cta w-100 mt-3 shadow-sm">إرسال الطلب بكرامة</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
