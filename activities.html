<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأنشطة والدعوات - منصة الأعزاء</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-light bg-white shadow-sm sticky-top luxury-nav">
        <div class="container">
            <a class="btn btn-sm btn-outline-secondary" href="index.html"><i class="fa-solid fa-arrow-right me-1"></i> عودة</a>
            <span class="navbar-brand mb-0 h1 m-auto text-gold"><i class="fa-solid fa-calendar-days me-2"></i> الأنشطة والدعوات الميدانية</span>
        </div>
    </nav>

    <div class="container my-4" style="max-width: 700px;">
        <h4 class="fw-bold mb-4 text-center"><i class="fa-solid fa-circle-nodes text-warning"></i> تصفح الأنشطة حسب مجال رغبتك</h4>
        
        <!-- فرز المجالات والملفات السريعة للمطابقة ليدخل المتطوع ويجد المطلوب -->
        <div class="row g-2 mb-4 text-center">
            <div class="col-6 col-md-3">
                <div class="p-3 bg-white shadow-sm rounded-3 border-top border-warning" style="cursor: pointer;" onclick="alert('تصفح ملفات التوثيق والتغطية الإعلامية')">
                    <i class="fa-solid fa-camera-retro fa-2x text-warning mb-2"></i>
                    <h6 class="fw-bold mb-0 small">تطوع إعلامي</h6>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="p-3 bg-white shadow-sm rounded-3 border-top border-warning" style="cursor: pointer;" onclick="alert('تصفح ورش التعمير والترميم القائمة')">
                    <i class="fa-solid fa-trowel-bricks fa-2x text-warning mb-2"></i>
                    <h6 class="fw-bold mb-0 small">أنشطة ترميم</h6>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="p-3 bg-white shadow-sm rounded-3 border-top border-warning" style="cursor: pointer;" onclick="alert('تصفح نقاط الرعاية الصحية الطبية')">
                    <i class="fa-solid fa-user-doctor fa-2x text-warning mb-2"></i>
                    <h6 class="fw-bold mb-0 small">تطوع صحي</h6>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="p-3 bg-white shadow-sm rounded-3 border-top border-warning" style="cursor: pointer;" onclick="alert('تصفح برامج دعم الأطفال والعائلات')">
                    <i class="fa-solid fa-face-smile fa-2x text-warning mb-2"></i>
                    <h6 class="fw-bold mb-0 small">دعم نفسي</h6>
                </div>
            </div>
        </div>

        <hr class="opacity-10 mb-4">

        <h5 class="fw-bold mb-3"><i class="fa-solid fa-envelope-open-text text-warning me-1"></i> دعوات عامة مفتوحة للعمل الإعماري</h5>
        
        <!-- دعوة 1 -->
        <div class="card p-3 mb-3 border-0 shadow-sm rounded-3">
            <div class="d-flex align-items-center gap-3">
                <div class="bg-warning text-dark p-3 rounded-3 text-center fw-bold" style="min-width: 70px;">
                    05 <br> <span class="small">تموز</span>
                </div>
                <div>
                    <h6 class="fw-bold mb-1">دعوة للاجتماع التنسيقي الميداني لمهندسي وفنيي الإعمار</h6>
                    <p class="text-muted small mb-0"><i class="fa-solid fa-location-dot me-1 text-danger"></i> مركز التنسيق البلدي - صور | الساعة 4:00 عصراً</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
