<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خرائط العمل الجغرافي - منصة الأعزاء</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-light bg-white shadow-sm sticky-top luxury-nav">
        <div class="container">
            <a class="btn btn-sm btn-outline-secondary" href="index.html"><i class="fa-solid fa-arrow-right me-1"></i> عودة</a>
            <span class="navbar-brand mb-0 h1 m-auto text-gold"><i class="fa-solid fa-map-location-dot me-2"></i> خرائط العمل وتواجد الورش</span>
        </div>
    </nav>

    <div class="container my-4" style="max-width: 700px;">
        <div class="card border-0 shadow-sm p-4 luxury-card bg-dark text-white text-center">
            <h5 class="fw-bold text-warning mb-2">رادار النطاق الجغرافي والاحتياجات بالجنوب</h5>
            <p class="small text-muted">اضغط على القضاء لمشاهدة خريطة الورش والبيوت قيد الإعمار</p>
            
            <div class="list-group mt-3 text-end">
                <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center bg-transparent text-white border-secondary" onclick="alert('خريطة قضاء صور: 18 ورشة ترميم نشطة حالياً')">
                    <span><i class="fa-solid fa-location-crosshairs text-warning me-2"></i> قضاء صور والقرى المحيطة</span>
                    <span class="badge bg-warning text-dark">18 ورشة نشطة</span>
                </button>
                <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center bg-transparent text-white border-secondary" onclick="alert('خريطة قضاء بنت جبيل: بحاجة عاجلة لفنيي كهرباء وتأهيل شبكات مياه')">
                    <span><i class="fa-solid fa-location-crosshairs text-warning me-2"></i> قضاء بنت جبيل والبلدات الحدودية</span>
                    <span class="badge bg-danger text-white">بحاجة لدعم عاجل</span>
                </button>
                <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center bg-transparent text-white border-secondary" onclick="alert('خريطة مرجعيون وحاصبيا والنبطية: 24 مشروع تم إنجازه بنجاح')">
                    <span><i class="fa-solid fa-location-crosshairs text-warning me-2"></i> قضاء النبطية، مرجعيون وحاصبيا</span>
                    <span class="badge bg-success text-white">24 منزل تم إعماره</span>
                </button>
            </div>

            <div class="mock-map-container mt-4" style="height: 250px;">
                <div class="map-overlay-info">
                    <i class="fa-solid fa-location-dot fa-2x text-warning mb-2 animate-bounce"></i>
                    <h6 class="fw-bold text-warning">رادار محاكاة الـ GPS الجغرافي الميداني</h6>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
