<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خرائط العمل الجغرافي - منصة الأعزاء</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="backToTop" class="back-to-top" aria-label="العودة إلى الأعلى"><i class="fa-solid fa-arrow-up"></i></button>

    <!-- ترويسة الصفحة -->
    <header class="page-hero">
        <div class="container top-row d-flex justify-content-between align-items-center">
            <a class="btn btn-sm btn-outline-warning back-btn" href="index.html"><i class="fa-solid fa-arrow-right me-1"></i> عودة للرئيسية</a>
            <a href="index.html" class="luxury-brand-logo small-logo text-decoration-none">
                <i class="fa-solid fa-hand-holding-heart me-2 brand-icon"></i>الأعزّاء
            </a>
        </div>
        <div class="container text-center">
            <h1 class="page-hero-title"><i class="fa-solid fa-map-location-dot me-2 pulse-icon"></i>خرائط العمل وتواجد الورش</h1>
            <p class="page-hero-sub">رادار النطاق الجغرافي والاحتياجات بالجنوب، حسب كل قضاء</p>
        </div>
    </header>

    <div class="container my-5 reveal-on-scroll" style="max-width: 760px;">
        <div class="card border-0 shadow-sm p-4 luxury-card bg-dark text-white text-center">
            <p class="small text-muted mb-3"><i class="fa-solid fa-hand-pointer me-1"></i> اضغط على القضاء لمشاهدة خريطة الورش والبيوت قيد الإعمار</p>

            <div class="d-flex flex-column gap-2 mt-2 text-end">
                <button class="region-row btn d-flex justify-content-between align-items-center bg-transparent text-white p-3" onclick="alert('خريطة قضاء صور: 18 ورشة ترميم نشطة حالياً')">
                    <span><i class="fa-solid fa-location-crosshairs text-warning me-2"></i> قضاء صور والقرى المحيطة</span>
                    <span class="badge bg-warning text-dark">18 ورشة نشطة</span>
                </button>
                <button class="region-row btn d-flex justify-content-between align-items-center bg-transparent text-white p-3" onclick="alert('خريطة قضاء بنت جبيل: بحاجة عاجلة لفنيي كهرباء وتأهيل شبكات مياه')">
                    <span><i class="fa-solid fa-location-crosshairs text-warning me-2"></i> قضاء بنت جبيل والبلدات الحدودية</span>
                    <span class="badge bg-danger text-white urgent-badge">بحاجة لدعم عاجل</span>
                </button>
                <button class="region-row btn d-flex justify-content-between align-items-center bg-transparent text-white p-3" onclick="alert('خريطة مرجعيون وحاصبيا والنبطية: 24 مشروع تم إنجازه بنجاح')">
                    <span><i class="fa-solid fa-location-crosshairs text-warning me-2"></i> قضاء النبطية، مرجعيون وحاصبيا</span>
                    <span class="badge bg-success text-white">24 منزل تم إعماره</span>
                </button>
            </div>

            <div class="mock-map-container mt-4" style="height: 250px;">
                <div class="map-overlay-info">
                    <i class="fa-solid fa-location-dot fa-2x text-warning mb-2 pulse-icon"></i>
                    <h6 class="fw-bold text-warning">رادار محاكاة الـ GPS الجغرافي الميداني</h6>
                </div>
            </div>

            <div class="d-flex justify-content-center gap-3 flex-wrap mt-4 small">
                <span><span class="badge bg-warning text-dark">&nbsp;</span> ورش نشطة</span>
                <span><span class="badge bg-danger">&nbsp;</span> دعم عاجل</span>
                <span><span class="badge bg-success">&nbsp;</span> مشاريع منجزة</span>
            </div>
        </div>
    </div>

    <footer class="site-footer-mini">
        <span class="text-gold fw-bold">منصة الأعزاء</span> © 2026 - مبادرة أهلية تطوعية تكافلية
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
